<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github User Finder</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="container">
        <header>
            <h1>
                <i class="fab fa-github"></i>GitHub User Finder
            </h1>
            <p>Search for any GitHub user to see their profile and repositories </p>
        </header>
    </div>
    <div class="search-container">
        <input type="text" id="search" placeholder="Enter a github username" autocomplete="off">
        <button id="search-btn">Search</button>
    </div>
    <div id="profile-container" class="hidden">
        <div class="profile-header">
            <img src="" alt="Profile image" id="prof-img">
            <div class="profile-info">
                <h2 id="name"></h2>
                <p id="username"></p>
                <p id="bio"></p>
                <div class="location-date">
                    <p>
                        <i class="fas fa-map-marker"></i>
                        <span>Not specified yet</span>
                    </p>
                    <p>
                        <i class="far fa-calendar"></i>
                        Joined date <span id="date-joined"></span>
                    </p>
                </div>
                <a href="#" id="profile-view" target="_blank" class="btn">View Profile</a>
            </div>
        </div>
        <div class="stats">
            <div class="stats">
                <i class="fas fa-users"></i>
                <span id="followers"> Followers</span>
            </div>
            <div class="stats">
                <i class="fas fa-user-friends"></i>
                    <span id="following"> Following</span>
                
            </div>
            <div class="stats">
                <i class="fas fa-code-branch"></i>
                <span id="repos">repositories</span>
            </div>
        </div>
        <div class="additional-info">
            <div class="info-item" id="linkedin-container">
                    <i class="fa-brands fa-linkedin-in"></i>
                    <a id="linkedin" href="#" target="_blank">No link</a>
            </div>
            <div class="info-item" id="twitter-container">
                <i class="fab fa-twitter"></i>
                <a id="twitter" href="#" target="_blank">No twitter</a>
                
            </div>

            <div class="repos-section">
                <h3>Latest repositories</h3>
                <div id="repos-container" class="repos-container">
                    <!-- repository insertion here -->
                    <div class="loading-repos">Loading repositories</div>
                </div>
            </div>
        </div>
        <div class="error-container" class="hidden">
            <p>No user found.Try another username</p>
        </div>
        

    </div>



    <script src="script.js"></script>
</body>

</html>
